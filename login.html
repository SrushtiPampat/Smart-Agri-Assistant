<!DOCTYPE html>
<html>
<head>
  <title>Farmer Login</title>
  <link rel="stylesheet" href="new.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    /* NAVBAR */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      height: 90px;

      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 50px;

      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo {
      color: #fff;
      font-size: 18px;
      font-weight: bold;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 40px;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .login-icon img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 3px solid #7CFC00;
    }

    /* BODY (NO FLEX HERE ❌) */
    body {
      margin: 0;
      padding-top: 90px;
      background: url("farmer.jpg") no-repeat center center/cover;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      top: 0;
      left: 0;
      z-index: -1;
    }

    /* LOGIN CONTAINER (controls position) */
    .login-container {
      height: calc(100vh - 90px);
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding-right: 80px;
    }

    /* LOGIN BOX */
    .login-box {
      width: 600px;
      padding: 60px;

      text-align: center;
      color: white;

      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border-radius: 20px;
    }

    h2 {
      margin-bottom: 25px;
      font-size: 26px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 15px;
    }

    input::placeholder {
      color: #ddd;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(45deg, #28a745, #3ecf5e);
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<!-- ✅ NAVBAR -->
<nav>
  <div class="nav-left">
    <div class="logo">🌱 Agri Assistant</div>

    <a href="login.html" class="login-icon">
      <img src="login.png" alt="login">
    </a>
  </div>

  <ul>
    <li><a href="Index.html">Home</a></li>
    <li><a href="weather.html">Weather</a></li>
    <li><a href="crops.html">Crops</a></li>
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<div class="login-container">
  <div class="login-box">
    <h2>🌱 Farmer Login</h2>

    <input type="text" id="name" placeholder="Enter your name">
    <input type="text" id="location" placeholder="Enter your location">

    <button onclick="login()">Login successfully</button>
  </div>
</div>

<script>
function login() {
  let name = document.getElementById("name").value;
  let location = document.getElementById("location").value;

  if (!name || !location) {
    alert("Fill all fields ❗");
    return;
  }

  localStorage.setItem("name", name);
  localStorage.setItem("location", location);
  localStorage.setItem("isLoggedIn", "true");

  alert("Login successful ✅");

  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
